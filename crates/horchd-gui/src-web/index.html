<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>horchd</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d0e12;
      --fg: #d8dce3;
      --muted: #7c8190;
      --card: #161821;
      --accent: #82a3ff;
      --good: #4ade80;
      --bad: #f87171;
    }
    body {
      font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      margin: 0; padding: 16px;
      background: var(--bg); color: var(--fg);
    }
    h1 { font-size: 18px; margin: 0 0 12px; font-weight: 600; }
    .status { display: flex; gap: 16px; margin-bottom: 16px; color: var(--muted); }
    .badge { padding: 2px 8px; border-radius: 4px; background: var(--card); }
    .badge.good { color: var(--good); }
    .badge.bad  { color: var(--bad);  }
    .card {
      background: var(--card);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 8px;
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 12px;
      align-items: center;
    }
    .card .name { font-weight: 600; }
    .card .meta { color: var(--muted); font-size: 12px; }
    button {
      background: transparent; color: var(--accent); border: 1px solid var(--accent);
      padding: 4px 10px; border-radius: 4px; cursor: pointer; font: inherit;
    }
    button:hover { background: var(--accent); color: #000; }
    .row-actions { display: flex; gap: 8px; }
    .empty { color: var(--muted); padding: 32px; text-align: center; }
  </style>
</head>
<body>
  <h1>horchd</h1>
  <div class="status">
    <span id="state" class="badge">…</span>
    <span class="badge">audio <span id="audio-fps">…</span> fps</span>
    <span class="badge">score <span id="score-fps">…</span> fps</span>
  </div>
  <div id="wakes"></div>

  <script type="module">
    // Tauri 2 invoke; works only when served by tauri (or via @tauri-apps/api/core).
    const invoke = window.__TAURI__?.core?.invoke
      ?? (async () => { throw new Error("not running inside Tauri"); });

    async function refresh() {
      try {
        const status = await invoke("get_status");
        document.getElementById("state").textContent =
          status.running ? "running" : "stopped";
        document.getElementById("state").className =
          "badge " + (status.running ? "good" : "bad");
        document.getElementById("audio-fps").textContent = status.audio_fps.toFixed(2);
        document.getElementById("score-fps").textContent = status.score_fps.toFixed(2);

        const wakes = await invoke("list_wakewords");
        const root = document.getElementById("wakes");
        if (wakes.length === 0) {
          root.innerHTML = '<div class="empty">No wakewords configured. Use <code>horchctl add</code>.</div>';
          return;
        }
        root.innerHTML = "";
        for (const w of wakes) {
          const card = document.createElement("div");
          card.className = "card";
          card.innerHTML = `
            <div>
              <div class="name">${w.name}</div>
              <div class="meta">threshold ${w.threshold.toFixed(3)} · cooldown ${w.cooldown_ms} ms · ${w.model}</div>
            </div>
            <div class="row-actions">
              <button data-action="toggle" data-name="${w.name}" data-enabled="${w.enabled}">
                ${w.enabled ? "Disable" : "Enable"}
              </button>
            </div>
          `;
          root.appendChild(card);
        }
      } catch (err) {
        document.getElementById("wakes").innerHTML =
          `<div class="empty">D-Bus error: ${err}</div>`;
      }
    }

    document.addEventListener("click", async (ev) => {
      const t = ev.target;
      if (t.tagName !== "BUTTON" || t.dataset.action !== "toggle") return;
      const name = t.dataset.name;
      const enabling = t.dataset.enabled !== "true";
      try {
        await invoke("set_enabled", { name, enabled: enabling, save: false });
        await refresh();
      } catch (err) {
        alert("toggle failed: " + err);
      }
    });

    refresh();
    setInterval(refresh, 2000);
  </script>
</body>
</html>
