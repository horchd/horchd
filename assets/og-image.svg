  <circle cx="1120" cy="330" r="22" fill="none" stroke="#83e89c" stroke-width="1.5" opacity="0.45"/>

  <g font-family="'JetBrains Mono', 'IBM Plex Mono', 'Fira Code', monospace" fill="#f5f1ea">
    <text x="80" y="180" font-size="120" font-weight="600" letter-spacing="-2">horch<tspan font-style="italic">d</tspan><tspan fill="#ff7a1a" font-style="normal">_</tspan></text>
