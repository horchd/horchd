<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#100d0a"/>
      <stop offset="1" stop-color="#06050a"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="65%">
      <stop offset="60%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0 L0 0 0 48" fill="none" stroke="#1d1a16" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.6"/>
  <rect width="1200" height="630" fill="url(#vignette)"/>

  <g transform="translate(80,330)" fill="none" stroke="#ff7a1a" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0 0 L80 0 L120 -60 L160 80 L200 -40 L240 60 L280 -20 L320 40 L360 -90 L400 110 L440 0 L520 0 L560 -30 L600 50 L640 -70 L680 90 L720 -10 L760 20 L800 -50 L840 70 L880 0 L1040 0"/>
